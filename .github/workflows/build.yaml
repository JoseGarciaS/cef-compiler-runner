name: Build CefPdfWeaver

on:
  repository_dispatch:
    types: [forgejo_ping]

env:
  CEF_VERSION: cef_binary_149.0.4+g2f1bfd8+chromium-149.0.7827.156

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" `
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - name: Download CEF
        run: |
          $url = "https://cef-builds.spotifycdn.com/$([uri]::EscapeDataString('${{ env.CEF_VERSION }}'))_windows64_minimal.tar.bz2"
          Invoke-WebRequest $url -OutFile cef.tar.bz2
          New-Item -ItemType Directory -Force C:\cef\windows | Out-Null
          tar -xjf cef.tar.bz2 -C C:\cef\windows --strip-components=1

      - name: Configure
        run: cmake -S CefPdfWeaverHelper -B build/windows -DCEF_ROOT=C:\cef\windows

      - name: Build
        run: cmake --build build/windows --config Release --parallel

      - name: Stage runtime
        run: cmake --install build/windows --config Release --prefix stage/runtimes/win-x64/native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-win-x64
          path: stage/runtimes/win-x64/native

  pack-windows:
    runs-on: windows-latest
    needs: build-windows
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" `
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: runtime-win-x64
          path: stage/runtimes/win-x64/native

      - name: Pack
        run: |
          $VERSION = "0.0.${{ github.run_number }}"
          dotnet pack DotNet\CefPdfWeaver\CefPdfWeaver.csproj -c Release -o artifacts /p:Version=$VERSION
          dotnet pack DotNet\CefPdfWeaver.Runtime.win-x64\CefPdfWeaver.Runtime.win-x64.csproj -c Release -o artifacts /p:Version=$VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-win
          path: artifacts/*.nupkg

  verify-windows:
    runs-on: windows-latest
    needs: pack-windows
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" `
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: local-feed

      - name: Remove local ProjectReference
        working-directory: DotNet/TestApp
        run: dotnet remove reference ../CefPdfWeaver/CefPdfWeaver.csproj

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          $VERSION = "0.0.${{ github.run_number }}"
          dotnet add package CefPdfWeaver --version $VERSION --source "${{ github.workspace }}\local-feed"
          dotnet add package CefPdfWeaver.runtime.win-x64 --version $VERSION --source "${{ github.workspace }}\local-feed"

      - name: Publish test app
        working-directory: DotNet/TestApp
        run: dotnet publish -r win-x64 --self-contained -o publish

      - name: Run smoke test
        working-directory: DotNet/TestApp/publish
        run: |
          .\TestApp.exe --html-dir "${{ github.workspace }}\Html" --prefix ci
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Smoke test failed with exit code $LASTEXITCODE"
            exit 1
          }

  #  Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
              "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y cmake ninja-build libgtk-3-dev libnss3 libasound2t64 libxss1

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_linux64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/linux
          tar -xjf cef.tar.bz2 -C /tmp/cef/linux --strip-components=1

      - name: Configure
        run: cmake -S CefPdfWeaverHelper -B build/linux -G Ninja -DCMAKE_BUILD_TYPE=Release -DCEF_ROOT=/tmp/cef/linux

      - name: Build
        run: cmake --build build/linux --parallel

      - name: Stage runtime
        run: cmake --install build/linux --prefix stage/runtimes/linux-x64/native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-linux-x64
          path: stage/runtimes/linux-x64/native

  pack-linux:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
              "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: runtime-linux-x64
          path: stage/runtimes/linux-x64/native

      - name: Pack
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet pack DotNet/CefPdfWeaver.Runtime.linux-x64/CefPdfWeaver.Runtime.linux-x64.csproj -c Release -o artifacts /p:Version=$VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-linux
          path: artifacts/*.nupkg

  verify-linux:
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-windows]
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
              "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-linux
          path: local-feed

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: local-feed

      - name: Remove local ProjectReference
        working-directory: DotNet/TestApp
        run: dotnet remove reference ../CefPdfWeaver/CefPdfWeaver.csproj

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet add package CefPdfWeaver --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"
          dotnet add package CefPdfWeaver.runtime.linux-x64 --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"

      - name: Publish test app
        working-directory: DotNet/TestApp
        run: dotnet publish -r linux-x64 --self-contained -o publish

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run smoke test
        working-directory: DotNet/TestApp/publish
        run: xvfb-run --auto-servernum ./TestApp --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci

  # Mac
  build-macos:
    runs-on: macos-15-intel
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
              "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - name: Install dependencies
        run: brew install cmake ninja wget
      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_macosx64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/macos
          tar -xjf cef.tar.bz2 -C /tmp/cef/macos --strip-components=1

      - name: Configure
        run: cmake -S CefPdfWeaverHelper -B build/macos -G Ninja -DCMAKE_BUILD_TYPE=Release -DCEF_ROOT=/tmp/cef/macos -DCMAKE_CXX_FLAGS="-fexperimental-library"

      - name: Build
        run: cmake --build build/macos --parallel

      - name: Stage and zip runtime
        run: |
          cmake --install build/macos --prefix stage/runtimes/osx-x64/native
          cd stage/runtimes/osx-x64
          ditto -c -k --sequesterRsrc native native.zip
          rm -rf native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-osx-x64
          path: stage/runtimes/osx-x64/native.zip

  pack-macos:
    runs-on: macos-15-intel
    needs: build-macos
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
              "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: runtime-osx-x64
          path: stage/runtimes/osx-x64/

      - name: Pack
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet pack DotNet/CefPdfWeaver.Runtime.osx-x64/CefPdfWeaver.Runtime.osx-x64.csproj -c Release -o artifacts /p:Version=$VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-osx
          path: artifacts/*.nupkg

  verify-macos:
    runs-on: macos-15-intel
    needs: [pack-macos, pack-windows]
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
              "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-osx
          path: local-feed

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: local-feed

      - name: Remove local ProjectReference
        working-directory: DotNet/TestApp
        run: dotnet remove reference ../CefPdfWeaver/CefPdfWeaver.csproj

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet add package CefPdfWeaver --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"
          dotnet add package CefPdfWeaver.runtime.osx-x64 --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"

      - name: Publish test app
        working-directory: DotNet/TestApp
        run: dotnet publish -r osx-x64 --self-contained -o publish

      - name: List directory
        working-directory: DotNet/TestApp/publish
        run: ls

      - name: Ad-hoc codesign
        working-directory: DotNet/TestApp/publish
        run: |
          codesign --force --sign - \
              "cef_pdf_weaver_helper.app/Contents/Frameworks/Chromium Embedded Framework.framework/Chromium Embedded Framework"
          codesign --force --sign - \
              "cef_pdf_weaver_helper.app/Contents/Frameworks/cef_pdf_weaver_subprocess Helper.app/Contents/MacOS/cef_pdf_weaver_subprocess Helper"
          codesign --force --sign - "cef_pdf_weaver_helper.app"

      - name: Run smoke test
        working-directory: DotNet/TestApp/publish
        run: ./TestApp --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci

  # Publish
  publish-to-forgejo:
    runs-on: ubuntu-latest
    needs:
      [
        build-windows,
        pack-windows,
        verify-windows,
        build-linux,
        pack-linux,
        verify-linux,
        build-macos,
        pack-macos,
        verify-macos,
      ]
    if: success()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-linux
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-osx
          path: artifacts

      - name: Add Forgejo NuGet source
        run: |
          dotnet nuget add source \
              "https://${{ secrets.FORGEJO_PACKAGES }}/nuget/index.json" \
              --name forgejo \
              --username "${{ secrets.FORGEJO_USERNAME }}" \
              --password "${{ secrets.FORGEJO_TOKEN }}" \
              --store-password-in-clear-text

      - name: Push to Forgejo NuGet registry
        run: |
          dotnet nuget push artifacts/*.nupkg \
              --source forgejo \
              --api-key "${{ secrets.FORGEJO_TOKEN }}" \
              --skip-duplicate

      - name: Report success to Forgejo
        run: |
          SHA=$(git ls-remote "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" "refs/heads/${{ github.event.client_payload.ref }}" | cut -f1)
          curl -X POST \
              -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
              -H "Content-Type: application/json" \
              "https://${{ secrets.FORGEJO_API }}/statuses/$SHA" \
              -d '{"state":"success","context":"github-ci","description": "Build completed"}'

  notify-forgejo-failure:
    runs-on: ubuntu-latest
    needs:
      [
        build-windows,
        pack-windows,
        verify-windows,
        build-linux,
        pack-linux,
        verify-linux,
        build-macos,
        pack-macos,
        verify-macos,
      ]
    if: failure()
    steps:
      - name: Report failure to Forgejo
        run: |
          SHA=$(git ls-remote "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" "refs/heads/${{ github.event.client_payload.ref }}" | cut -f1)
          curl -X POST \
              -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
              -H "Content-Type: application/json" \
              "https://${{ secrets.FORGEJO_API }}/statuses/$SHA" \
              -d '{"state":"failure","context":"github-ci", "description": "Build failed"}'
