name: Build CefPdfWeaver

on:
  repository_dispatch:
    types: [forgejo_ping]

env:
  CEF_VERSION: cef_binary_149.0.4+g2f1bfd8+chromium-149.0.7827.156

jobs:
  # Build

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" `
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - name: Download CEF
        run: |
          $url = "https://cef-builds.spotifycdn.com/$([uri]::EscapeDataString('${{ env.CEF_VERSION }}'))_windows64_minimal.tar.bz2"
          Invoke-WebRequest $url -OutFile cef.tar.bz2
          New-Item -ItemType Directory -Force C:\cef\windows | Out-Null
          tar -xjf cef.tar.bz2 -C C:\cef\windows --strip-components=1

      - name: Configure
        run: cmake -S CefPdfWeaverHelper -B build/windows -DCEF_ROOT=C:\cef\windows -DUSE_SANDBOX=OFF

      - name: Build
        run: cmake --build build/windows --config Release --parallel

      - name: Stage runtime
        run: cmake --install build/windows --config Release --prefix stage/runtimes/win-x64/native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-win-x64
          path: stage/runtimes/win-x64/native

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y cmake ninja-build libgtk-3-dev libnss3 libasound2t64 libxss1

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_linux64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/linux
          tar -xjf cef.tar.bz2 -C /tmp/cef/linux --strip-components=1

      - name: Configure
        run: |
          cmake -S CefPdfWeaverHelper -B build/linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCEF_ROOT=/tmp/cef/linux

      - name: Build
        run: cmake --build build/linux --parallel

      - name: Stage runtime
        run: cmake --install build/linux --prefix stage/runtimes/linux-x64/native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-linux-x64
          path: stage/runtimes/linux-x64/native

  build-macos-x64:
    runs-on: macos-15-intel
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - name: Install dependencies
        run: brew install cmake ninja wget

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_macosx64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/macos-x64
          tar -xjf cef.tar.bz2 -C /tmp/cef/macos-x64 --strip-components=1

      - name: Configure
        run: |
          cmake -S CefPdfWeaverHelper -B build/macos-x64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCEF_ROOT=/tmp/cef/macos-x64 \
            -DCMAKE_CXX_FLAGS="-fexperimental-library"

      - name: Build
        run: cmake --build build/macos-x64 --parallel

      - name: Stage and zip runtime
        run: |
          cmake --install build/macos-x64 --prefix stage/runtimes/osx-x64/native

          APP="stage/runtimes/osx-x64/native/cef_pdf_weaver_helper.app"
          FRAMEWORKS="$APP/Contents/Frameworks"

          codesign --force --sign - \
            "$FRAMEWORKS/Chromium Embedded Framework.framework/Chromium Embedded Framework"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_subprocess.app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper.app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (Renderer).app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (Plugin).app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (Alerts).app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (GPU).app"
          codesign --force --sign - "$APP"

          cd stage/runtimes/osx-x64
          ditto -c -k --sequesterRsrc native native.zip
          rm -rf native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-osx-x64
          path: stage/runtimes/osx-x64/native.zip

  build-macos-arm64:
    runs-on: macos-15
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - name: Install dependencies
        run: brew install cmake ninja wget

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_macosarm64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/macos-arm64
          tar -xjf cef.tar.bz2 -C /tmp/cef/macos-arm64 --strip-components=1

      - name: Configure
        run: |
          cmake -S CefPdfWeaverHelper -B build/macos-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCEF_ROOT=/tmp/cef/macos-arm64 \
            -DCMAKE_CXX_FLAGS="-fexperimental-library"

      - name: Build
        run: cmake --build build/macos-arm64 --parallel

      - name: Stage and zip runtime
        run: |
          cmake --install build/macos-arm64 --prefix stage/runtimes/osx-arm64/native

          APP="stage/runtimes/osx-arm64/native/cef_pdf_weaver_helper.app"
          FRAMEWORKS="$APP/Contents/Frameworks"

          codesign --force --sign - \
            "$FRAMEWORKS/Chromium Embedded Framework.framework/Chromium Embedded Framework"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_subprocess.app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper.app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (Renderer).app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (Plugin).app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (Alerts).app"
          codesign --force --sign - \
            "$FRAMEWORKS/cef_pdf_weaver_helper Helper (GPU).app"
          codesign --force --sign - "$APP"

          cd stage/runtimes/osx-arm64
          ditto -c -k --sequesterRsrc native native.zip
          rm -rf native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-osx-arm64
          path: stage/runtimes/osx-arm64/native.zip

  # Packing

  pack-windows:
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: runtime-win-x64
          path: stage/runtimes/win-x64/native

      - name: Pack
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet pack DotNet/CefPdfWeaver/CefPdfWeaver.csproj -c Release -o artifacts /p:Version=$VERSION
          dotnet pack DotNet/CefPdfWeaver.Runtime.win-x64/CefPdfWeaver.Runtime.win-x64.csproj -c Release -o artifacts /p:Version=$VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-win
          path: artifacts/*.nupkg

  pack-linux:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: runtime-linux-x64
          path: stage/runtimes/linux-x64/native

      - name: Pack
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet pack DotNet/CefPdfWeaver.Runtime.linux-x64/CefPdfWeaver.Runtime.linux-x64.csproj -c Release -o artifacts /p:Version=$VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-linux
          path: artifacts/*.nupkg

  pack-macos-x64:
    runs-on: ubuntu-latest
    needs: build-macos-x64
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: runtime-osx-x64
          path: stage/runtimes/osx-x64/

      - name: Pack
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet pack DotNet/CefPdfWeaver.Runtime.osx-x64/CefPdfWeaver.Runtime.osx-x64.csproj -c Release -o artifacts /p:Version=$VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-osx-x64
          path: artifacts/*.nupkg

  pack-macos-arm64:
    runs-on: ubuntu-latest
    needs: build-macos-arm64
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: runtime-osx-arm64
          path: stage/runtimes/osx-arm64/

      - name: Pack
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet pack DotNet/CefPdfWeaver.Runtime.osx-arm64/CefPdfWeaver.Runtime.osx-arm64.csproj -c Release -o artifacts /p:Version=$VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-osx-arm64
          path: artifacts/*.nupkg

  # Verification

  verify-windows:
    runs-on: windows-latest
    needs: pack-windows
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" `
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: local-feed

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          $VERSION = "0.0.${{ github.run_number }}"
          dotnet add package CefPdfWeaver --version $VERSION --source "${{ github.workspace }}\local-feed"
          dotnet add package CefPdfWeaver.runtime.win-x64 --version $VERSION --source "${{ github.workspace }}\local-feed"

      - name: "Smoke test Part 1: framework-dependent (dotnet run)"
        working-directory: DotNet/TestApp
        run: |
          dotnet run --html-dir "${{ github.workspace }}\Html" --prefix ci-fdd
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Framework-dependent smoke test failed"
            exit 1
          }

      - name: Publish (self-contained)
        working-directory: DotNet/TestApp
        run: dotnet publish -r win-x64 --self-contained -o publish

      - name: "Smoke test Part 2: self-contained"
        working-directory: DotNet/TestApp/publish
        run: |
          .\TestApp.exe --html-dir "${{ github.workspace }}\Html" --prefix ci-scd
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Self-contained smoke test failed"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-windows-pdfs
          path: |
            DotNet/TestApp/ci-fdd_*.pdf
            DotNet/TestApp/publish/ci-scd_*.pdf
          if-no-files-found: warn

  verify-linux:
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-windows]
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-linux
          path: local-feed

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: local-feed

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet add package CefPdfWeaver --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"
          dotnet add package CefPdfWeaver.runtime.linux-x64 --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: "Smoke test Part 1: framework-dependent (dotnet run)"
        working-directory: DotNet/TestApp
        run: |
          xvfb-run --auto-servernum \
            dotnet run --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci-fdd

      - name: Publish (self-contained)
        working-directory: DotNet/TestApp
        run: dotnet publish -r linux-x64 --self-contained -o publish

      - name: "Smoke test Part 2: self-contained"
        working-directory: DotNet/TestApp/publish
        run: xvfb-run --auto-servernum ./TestApp --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci-scd

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-linux-pdfs
          path: |
            DotNet/TestApp/ci-fdd_*.pdf
            DotNet/TestApp/publish/ci-scd_*.pdf
          if-no-files-found: warn

  verify-macos-x64:
    runs-on: macos-15-intel
    needs: [pack-macos-x64, pack-windows]
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-osx-x64
          path: local-feed

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: local-feed

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet add package CefPdfWeaver --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"
          dotnet add package CefPdfWeaver.runtime.osx-x64 --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"

      - name: "Smoke test Part 1: framework-dependent (dotnet run)"
        working-directory: DotNet/TestApp
        run: dotnet run --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci-fdd

      - name: Publish (self-contained)
        working-directory: DotNet/TestApp
        run: dotnet publish -r osx-x64 --self-contained -o publish

      - name: "Smoke test Part 2: self-contained"
        working-directory: DotNet/TestApp/publish
        run: ./TestApp --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci-scd

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-macos-x64-pdfs
          path: |
            DotNet/TestApp/ci-fdd_*.pdf
            DotNet/TestApp/publish/ci-scd_*.pdf
          if-no-files-found: warn

  verify-macos-arm64:
    runs-on: macos-15
    needs: [pack-macos-arm64, pack-windows]
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@${{ secrets.FORGEJO_REPO_URL }}.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-osx-arm64
          path: local-feed

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-win
          path: local-feed

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          VERSION="0.0.${{ github.run_number }}"
          dotnet add package CefPdfWeaver --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"
          dotnet add package CefPdfWeaver.runtime.osx-arm64 --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"

      - name: "Smoke test Part 1: framework-dependent (dotnet run)"
        working-directory: DotNet/TestApp
        run: dotnet run --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci-fdd

      - name: Publish (self-contained)
        working-directory: DotNet/TestApp
        run: dotnet publish -r osx-arm64 --self-contained -o publish

      - name: "Smoke test Part 2: self-contained"
        working-directory: DotNet/TestApp/publish
        run: ./TestApp --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci-scd

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-macos-arm64-pdfs
          path: |
            DotNet/TestApp/ci-fdd_*.pdf
            DotNet/TestApp/publish/ci-scd_*.pdf
          if-no-files-found: warn
