name: Cross-Compile + Smoke Test (Experiment)

on:
  repository_dispatch:
    types: [forgejo_ping]

env:
  CEF_VERSION: cef_binary_149.0.4+g2f1bfd8+chromium-149.0.7827.156

jobs:
  # ── BUILD (all on ubuntu-latest) ─────────────────────────────────────────

  xc-build-linux:
    name: Build Linux (native)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@code.grupoleitz.com/Leitz-Group/cef-pdf-weaver.git" .

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libgtk-3-dev libnss3 libasound2t64 libxss1

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_linux64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/linux
          tar -xjf cef.tar.bz2 -C /tmp/cef/linux --strip-components=1

      - name: Configure
        run: |
          cmake -S CefPdfWeaverHelper -B build/linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCEF_ROOT=/tmp/cef/linux \
            -DUSE_SANDBOX=OFF

      - name: Build
        run: cmake --build build/linux --parallel

      - name: Stage runtime
        run: cmake --install build/linux --prefix stage/runtimes/linux-x64/native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-linux-x64
          path: stage/runtimes/linux-x64/native
          if-no-files-found: warn

  xc-build-windows:
    name: Build Windows (clang-cl + xwin)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@code.grupoleitz.com/Leitz-Group/cef-pdf-weaver.git" .

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y clang lld llvm cmake ninja-build

      - name: Install xwin
        run: |
          curl -L -o xwin.tar.gz \
            https://github.com/Jake-Shadle/xwin/releases/download/0.6.5/xwin-0.6.5-x86_64-unknown-linux-musl.tar.gz
          tar xzf xwin.tar.gz
          sudo mv xwin-0.6.5-x86_64-unknown-linux-musl/xwin /usr/local/bin/
          xwin --accept-license splat --output /opt/xwin

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_windows64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/windows
          tar -xjf cef.tar.bz2 -C /tmp/cef/windows --strip-components=1

      - name: Write toolchain file
        run: |
          cat > /tmp/toolchain-win.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR AMD64)
          set(XWIN_ROOT "/opt/xwin")
          set(CMAKE_C_COMPILER clang-cl)
          set(CMAKE_CXX_COMPILER clang-cl)
          set(CMAKE_LINKER lld-link)
          set(CMAKE_C_COMPILER_TARGET x86_64-pc-windows-msvc)
          set(CMAKE_CXX_COMPILER_TARGET x86_64-pc-windows-msvc)
          foreach(inc
              "${XWIN_ROOT}/crt/include"
              "${XWIN_ROOT}/sdk/include/ucrt"
              "${XWIN_ROOT}/sdk/include/um"
              "${XWIN_ROOT}/sdk/include/shared")
            string(APPEND CMAKE_CXX_FLAGS_INIT " /imsvc${inc}")
            string(APPEND CMAKE_C_FLAGS_INIT " /imsvc${inc}")
          endforeach()
          foreach(lib
              "${XWIN_ROOT}/crt/lib/x86_64"
              "${XWIN_ROOT}/sdk/lib/um/x86_64"
              "${XWIN_ROOT}/sdk/lib/ucrt/x86_64")
            string(APPEND CMAKE_EXE_LINKER_FLAGS_INIT " /libpath:${lib}")
            string(APPEND CMAKE_SHARED_LINKER_FLAGS_INIT " /libpath:${lib}")
          endforeach()
          set(CMAKE_FIND_ROOT_PATH "${XWIN_ROOT}")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

      - name: Configure
        run: |
          cmake -S CefPdfWeaverHelper -B build/windows -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/toolchain-win.cmake \
            -DCEF_ROOT=/tmp/cef/windows \
            -DUSE_SANDBOX=OFF

      - name: Build
        run: cmake --build build/windows --parallel

      - name: Stage runtime
        run: cmake --install build/windows --prefix stage/runtimes/win-x64/native

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-win-x64
          path: stage/runtimes/win-x64/native
          if-no-files-found: warn

  xc-build-macos:
    name: Build macOS (osxcross)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@code.grupoleitz.com/Leitz-Group/cef-pdf-weaver.git" .

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm cmake ninja-build \
            libssl-dev libxml2-dev patch python3 xz-utils git curl zip

      - name: Download macOS SDK
        run: |
          mkdir -p /tmp/osxcross/tarballs
          curl -L -o /tmp/osxcross/tarballs/MacOSX13.3.sdk.tar.xz \
            https://github.com/alexey-lysiuk/macos-sdk/releases/download/13.3/MacOSX13.3.sdk.tar.xz

      - name: Build osxcross
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/osxcross /tmp/osxcross-src
          cp /tmp/osxcross/tarballs/MacOSX13.3.sdk.tar.xz /tmp/osxcross-src/tarballs/
          cd /tmp/osxcross-src
          UNATTENDED=1 ./build.sh
          sudo mv target /opt/osxcross

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/${CEF_VERSION}_macosx64_minimal.tar.bz2" -O cef.tar.bz2
          mkdir -p /tmp/cef/macos
          tar -xjf cef.tar.bz2 -C /tmp/cef/macos --strip-components=1

      - name: Write toolchain file
        run: |
          cat > /tmp/toolchain-mac.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Darwin)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          set(OSXCROSS_ROOT "/opt/osxcross")
          set(TRIPLE "x86_64-apple-darwin22")
          set(CMAKE_C_COMPILER   "${OSXCROSS_ROOT}/bin/${TRIPLE}-clang")
          set(CMAKE_CXX_COMPILER "${OSXCROSS_ROOT}/bin/${TRIPLE}-clang++")
          set(CMAKE_AR           "${OSXCROSS_ROOT}/bin/${TRIPLE}-ar")
          set(CMAKE_RANLIB       "${OSXCROSS_ROOT}/bin/${TRIPLE}-ranlib")
          set(CMAKE_OSX_SYSROOT           "${OSXCROSS_ROOT}/SDK/MacOSX13.3.sdk")
          set(CMAKE_OSX_DEPLOYMENT_TARGET "13.3")
          set(CMAKE_FIND_ROOT_PATH "${OSXCROSS_ROOT}")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

      - name: Configure
        run: |
          cmake -S CefPdfWeaverHelper -B build/macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/toolchain-mac.cmake \
            -DCEF_ROOT=/tmp/cef/macos \
            -DUSE_SANDBOX=OFF

      - name: Build
        run: cmake --build build/macos --parallel

      - name: Stage and zip runtime
        run: |
          cmake --install build/macos --prefix stage/runtimes/osx-x64/native
          cd stage/runtimes/osx-x64
          zip -ry native.zip native/
          rm -rf native/

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-osx-x64
          path: stage/runtimes/osx-x64/native.zip
          if-no-files-found: warn

  # ── PACK ─────────────────────────────────────────────────────────────────

  pack:
    name: Pack NuGet packages
    runs-on: ubuntu-latest
    needs: [xc-build-linux, xc-build-windows, xc-build-macos]
    if: always()
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@code.grupoleitz.com/Leitz-Group/cef-pdf-weaver.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: runtime-linux-x64
          path: stage/runtimes/linux-x64/native

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: runtime-win-x64
          path: stage/runtimes/win-x64/native

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: runtime-osx-x64
          path: stage/runtimes/osx-x64/

      - name: Pack
        run: |
          VERSION="0.0.${{ github.run_number }}-xc"
          for proj in \
            DotNet/CefPdfWeaver/CefPdfWeaver.csproj \
            DotNet/CefPdfWeaver.Runtime.linux-x64/CefPdfWeaver.Runtime.linux-x64.csproj \
            DotNet/CefPdfWeaver.Runtime.win-x64/CefPdfWeaver.Runtime.win-x64.csproj \
            DotNet/CefPdfWeaver.Runtime.osx-x64/CefPdfWeaver.Runtime.osx-x64.csproj; do
            dotnet pack "$proj" -c Release -o artifacts /p:Version=$VERSION || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-xc
          path: artifacts/*.nupkg
          if-no-files-found: warn

  # ── SMOKE TESTS (native runners) ─────────────────────────────────────────

  test-linux:
    name: Smoke test Linux
    runs-on: ubuntu-latest
    needs: pack
    continue-on-error: true
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@code.grupoleitz.com/Leitz-Group/cef-pdf-weaver.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-xc
          path: local-feed

      - name: Remove local ProjectReference
        working-directory: DotNet/TestApp
        run: dotnet remove reference ../CefPdfWeaver/CefPdfWeaver.csproj || true

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          VERSION="0.0.${{ github.run_number }}-xc"
          dotnet add package CefPdfWeaver --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"
          dotnet add package CefPdfWeaver.runtime.linux-x64 --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"

      - name: Publish test app
        working-directory: DotNet/TestApp
        run: dotnet publish -r linux-x64 --self-contained -o publish

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run smoke test
        working-directory: DotNet/TestApp/publish
        run: xvfb-run --auto-servernum ./TestApp --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-linux-pdfs
          path: DotNet/TestApp/publish/ci_*.pdf
          if-no-files-found: warn

  test-windows:
    name: Smoke test Windows
    runs-on: windows-latest
    needs: pack
    continue-on-error: true
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" `
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@code.grupoleitz.com/Leitz-Group/cef-pdf-weaver.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-xc
          path: local-feed

      - name: Remove local ProjectReference
        working-directory: DotNet/TestApp
        run: dotnet remove reference ..\CefPdfWeaver\CefPdfWeaver.csproj

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          $VERSION = "0.0.${{ github.run_number }}-xc"
          dotnet add package CefPdfWeaver --version $VERSION --source "${{ github.workspace }}\local-feed"
          dotnet add package CefPdfWeaver.runtime.win-x64 --version $VERSION --source "${{ github.workspace }}\local-feed"

      - name: Publish test app
        working-directory: DotNet/TestApp
        run: dotnet publish -r win-x64 --self-contained -o publish

      - name: Run smoke test
        working-directory: DotNet/TestApp/publish
        run: |
          .\TestApp.exe --html-dir "${{ github.workspace }}\Html" --prefix ci
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Smoke test failed with exit code $LASTEXITCODE"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-windows-pdfs
          path: DotNet/TestApp/publish/ci_*.pdf
          if-no-files-found: warn

  test-macos:
    name: Smoke test macOS
    runs-on: macos-15-intel
    needs: pack
    continue-on-error: true
    steps:
      - name: Clone from Forgejo
        run: |
          git clone --branch "${{ github.event.client_payload.ref }}" \
            "https://oauth2:${{ secrets.FORGEJO_TOKEN }}@code.grupoleitz.com/Leitz-Group/cef-pdf-weaver.git" .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs-xc
          path: local-feed

      - name: Remove local ProjectReference
        working-directory: DotNet/TestApp
        run: dotnet remove reference ../CefPdfWeaver/CefPdfWeaver.csproj || true

      - name: Add packages from local feed
        working-directory: DotNet/TestApp
        run: |
          VERSION="0.0.${{ github.run_number }}-xc"
          dotnet add package CefPdfWeaver --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"
          dotnet add package CefPdfWeaver.runtime.osx-x64 --version $VERSION --source "$GITHUB_WORKSPACE/local-feed"

      - name: Publish test app
        working-directory: DotNet/TestApp
        run: dotnet publish -r osx-x64 --self-contained -o publish

      - name: Ad-hoc codesign
        working-directory: DotNet/TestApp/publish
        run: |
          APP="cef_pdf_weaver_helper.app"
          FRAMEWORKS="$APP/Contents/Frameworks"
          codesign --force --sign - \
            "$FRAMEWORKS/Chromium Embedded Framework.framework/Chromium Embedded Framework"
          for helper in \
            "cef_pdf_weaver_helper Helper" \
            "cef_pdf_weaver_helper Helper (Renderer)" \
            "cef_pdf_weaver_helper Helper (GPU)" \
            "cef_pdf_weaver_helper Helper (Plugin)" \
            "cef_pdf_weaver_helper Helper (Alerts)" \
            "cef_pdf_weaver_subprocess"; do
            codesign --force --sign - "$FRAMEWORKS/$helper.app"
          done
          codesign --force --sign - "$APP"

      - name: Run smoke test
        working-directory: DotNet/TestApp/publish
        run: ./TestApp --html-dir "$GITHUB_WORKSPACE/Html" --prefix ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-macos-pdfs
          path: DotNet/TestApp/publish/ci_*.pdf
          if-no-files-found: warn
